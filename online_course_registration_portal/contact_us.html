<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <div class="d-flex flex-column justify-content-center align-items-center vh-100 min-vw-100">
        <form action="#" class="p-5 m-5 vw-100 border-dark shadow rounded-3 d-flex flex-column justify-content-center "
            style="max-width: 500px;">
            <h4 class="my-3 fw-bold text-center">
                Contact Us
            </h4>
            <div class="form-floating my-3">
                <input type="text" class="form-control" id="name" placeholder="" required>
                <label for="name" class="form-label">Name</label>
            </div>
            <div class="form-floating my-3">
                <input type="email" class="form-control" id="email" placeholder="" required>
                <label for="email" class="form-label">E-Mail</label>
            </div>
            <div class="form-floating my-3">
                <textarea class="form-control" id="subject" placeholder="" required></textarea>
                <label for="subject" class="form-label">Subject</label>
            </div>
            <div class="form-floating my-3">
                <textarea class="form-control" id="message" placeholder="" style="height:100px;" required></textarea>
                <label for="message" class="form-label">Message</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms">I Accept Terms & Conditions</label>
            </div>

            <div class="alert alert-warning" role="alert">
                Currently experiencing high demand, Replying could take some time.
            </div>

            <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>
    </div>
    <div class="d-flex flex-column justify-content-center align-items-center vh-100 min-vw-100">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3811.395749997993!2d78.59340827280057!3d17.199580420821956!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcba659868b4727%3A0xf39a771705e23170!2sCVR%20College%20Of%20Engineering!5e0!3m2!1sen!2sin!4v1781059747060!5m2!1sen!2sin"
            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        <div class="text-center mt-5">
            <strong>Address</strong><br>
            CVR College Of Engineering,<br>
            Vastunagar, Mangalpalli (V), Ibrahimpatnam (M),<br>
            Rangareddy (D), Telangana 501 510
        </div>
    </div>
    
</body>

</html>
