<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center mb-5">Technical Skills</h2>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">HTML</h5>
                        <p class="text-muted">Proficiency: 90%</p>
                        <div class="progress">
                            <div class="progress-bar bg-success"
                                role="progressbar"
                                style="width: 90%;">
                                90%
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">CSS</h5>
                        <p class="text-muted">Proficiency: 85%</p>
                        <div class="progress">
                            <div class="progress-bar bg-info"
                                role="progressbar"
                                style="width: 85%;">
                                85%
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Bootstrap</h5>
                        <p class="text-muted">Proficiency: 80%</p>
                        <div class="progress">
                            <div class="progress-bar bg-primary"
                                role="progressbar"
                                style="width: 80%;">
                                80%
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">JavaScript</h5>
                        <p class="text-muted">Proficiency: 75%</p>
                        <div class="progress">
                            <div class="progress-bar bg-warning text-dark"
                                role="progressbar"
                                style="width: 75%;">
                                75%
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
