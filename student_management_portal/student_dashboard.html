<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container min-vw-100 m-4">
        <h2 class="text-center">Student Dashboard</h2>
        <div class="row m-5 vh=100">
            <div class="col col-6 col-lg-3">
                <div class="card text-start shadow-sm bg-secondary text-center mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Total</h4>
                        <p class="card-text">250</p>
                    </div>
                </div>
            </div>
            <div class="col col-6 col-lg-3">
                <div class="card text-start shadow-sm bg-secondary text-center mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Present</h4>
                        <p class="card-text">230</p>
                    </div>
                </div>
            </div>
            <div class="col col-6 col-lg-3">
                <div class="card text-start shadow-sm bg-secondary text-center mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Absent</h4>
                        <p class="card-text">20</p>
                    </div>
                </div>
            </div>
            <div class="col col-6 col-lg-3">
                <div class="card text-start shadow-sm bg-secondary text-center mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Placements</h4>
                        <p class="card-text">240</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <h3 class="text-center">Student Table</h3>
        <div class="d-flex flex-row align-items-right justify-content-end">
            <div class="form">
                <input type="text" id="search" class="form-input" placeholder="Search...">
                <button type="button" class="btn btn-secondary rounded">Search</button>
            </div>
        </div>
        <table class="table  shadow-sm table-responsive">
            <tr class="table-dark">
                <th>Roll No</th>
                <th>Name</th>
                <th>Branch</th>
                <th>Attendance</th>
            </tr>
            <tr>
                <td>23B81A05V6</td>
                <td>Reddysai Jonnadula</td>
                <td>CSE</td>
                <td>80%</td>
            </tr>
            <tr>
                <td>23B81A05V7</td>
                <td>Rishwik G</td>
                <td>CSE</td>
                <td>90%</td>
            </tr>
            <tr>
                <td>23B81A05V6</td>
                <td>Reddysai Jonnadula</td>
                <td>CSE</td>
                <td>80%</td>
            </tr>
        </table>
    </div>

</body>
</html>
