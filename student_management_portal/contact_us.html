<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="d-flex flex-column justify-content-center align-items-center vh-100 min-vw-100">
        <form action="#" class="p-5 m-5 vw-100 border-dark shadow rounded-3 d-flex flex-column justify-content-center " style="max-width: 500px;">
            <h4 class="my-3 fw-bold text-center">
                Contact Us
            </h4>
            <div class="form-floating my-3">
                <input type="text" class="form-control" id="name" placeholder="" required>
                <label for="name" class="form-label">Name</label>
            </div>
            <div class="form-floating my-3">
                <input type="email" class="form-control" id="email" placeholder="" required>
                <label for="email" class="form-label" >E-Mail</label>
            </div>
            <div class="form-floating my-3">
                <textarea class="form-control" id="subject" placeholder="" required></textarea>
                <label for="subject" class="form-label">Subject</label>
            </div>
            <div class="form-floating my-3">
                <textarea class="form-control" id="message" placeholder="" style="height:100px;" required></textarea>
                <label for="message" class="form-label">Message</label>
            </div>
            
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms">I Accept Terms & Conditions</label>
            </div>

            <div class="alert alert-warning" role="alert">
                Currently experiencing high demand, Replying could take some time.
            </div>

            <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>
    </div>
</body>
</html>
