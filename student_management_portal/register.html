<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration From</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="d-flex flex-column justify-content-center align-items-center vh-100 min-vw-100">
        <form action="#" class="p-5 m-5 vw-100 border border-1 border-dark" style="max-width: 500px;">
            <div class="my-3 fw-bold text-center">
                Register
            </div>
            <div class="form-floating my-3">
                <input type="text" class="form-control" id="name" placeholder="" required>
                <label for="name" class="form-label">Full Name</label>
            </div>
            <div class="form-floating my-3">
                <input type="text" class="form-control" id="roll_no" placeholder="" required>
                <label for="roll_no" class="form-label">Roll Number</label>
            </div>
            <div class="form-floating my-3">
                <input type="email" class="form-control" id="email" placeholder="" required>
                <label for="email" class="form-label" >E-Mail</label>
            </div>
            <div class="form-floating my-3">
                <input type="tel" class="form-control" id="mobile" placeholder="" pattern="[0-9]{10}" required>
                <label for="mobile" class="form-label">Mobile Number</label>
            </div>

            <div class="input-group d-flex flex-column justify-content-center mb-3">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-select w-100" id="gender" aria-label="Gender" required>
                    <option selected>Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Prefer Not to Say">Prefer Not to Say</option>
                </select>
            </div>

            <div class="input-group d-flex flex-column justify-content-center">
                <label for="branch" class="form-label">Branch</label>
                <select class="form-select w-100" id="branch" aria-label="Branch" required>
                    <option selected>Branch</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="Mech">Mech</option>
                    <option value="Civil">Civil</option>
                </select>
            </div>
            <div class="form-floating my-3 mt-4">
                <input type="text" class="form-control" id="address" placeholder="" required>
                <label for="address" class="form-label">Address</label>
            </div>
            <div class="form-floating my-3">
                <input type="date" class="form-control" id="dob" placeholder="" required>
                <label for="dob" class="form-label">Date of Birth</label>
            </div>
            <div class="my-3">
                <label for="formFile" class="form-label">Upload image</label>
                <input class="form-control" type="file" id="formFile" required>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms">I Accept Terms & Conditions</label>
            </div>

            <button type="submit" class="btn btn-primary mt-3">Submit</button>
        </form>
    </div>
</body>
</html>
