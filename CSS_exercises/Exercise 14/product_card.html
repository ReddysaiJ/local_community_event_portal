<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 100px;
        }
        button{
            height: 30px;
            width: 70px;
            margin: 15px;
            border-radius: 20%;
        }
        button:hover{
            background-color: black;
            color: white;
        }

        .card {
            background-color: lightgray;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        card div {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        img {
            border-radius: 10%;
        }
        img:hover{
            transform: scale(1.1);
        }
        .details {
            margin: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-left: solid 2px;
        }

        @media (max-width: 1200px) {
            .card {
                flex-direction: column;
                width: 100%;
                height: auto;
                padding: 20px;
            }
            .details{
                display: flex;
                flex-direction: column;
                border-top: solid 2px;
                border-left: 0px;
            }
            .main{
                grid-template-columns: repeat(2, 1fr);
                grid-gap: 60px;
            }
        }

        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                width: 100%;
                height: auto;
                padding: 20px;
            }
            .details{
                display: flex;
                flex-direction: column;
                border-top: solid 2px;
                border-left: 0px;
            }
            .main{
                grid-template-columns: repeat(1, 1fr);
                grid-gap: 25px;
            }
        }
    </style>
</head>
