<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        button{
            background-color: blue;
            border-radius: 20px;
            color: white;
            width: 200px;
            height: 100px;
        }
        button:hover{
            background-color: green;
            transform: scale(1.1);
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <div>
        <button type="submit">Transition button</button>
    </div>
</body>
</html>
