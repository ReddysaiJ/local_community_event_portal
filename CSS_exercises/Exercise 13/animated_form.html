<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Animated Login Form</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        form{
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            border: solid 2px black;
            border-radius: 10%;
            animation: fade-in 3s ease-in 1s;
        }
        form label{
            font-size: 20px;
        }
        form input{
            width: 200px;
            height: 30px;
            border-radius: 10%;
        }
        form button{
            height: 30px;
            margin: 15px;
            border-radius: 20%;
        }
        .bt{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:hover{
            background-color: black;
            color: white;
        }
        @keyframes fade-in {
            from{
                opacity: 0;
            } 
            to{
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div>
        <form action="#">
            <label for="username">Username</label><br>
            <input type="text" id="username" placeholder="username" required><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="***" required><br>
            <div class="bt">
                <button type="submit">Submit</button>
            </div>
            
        </form>
    </div>
</body>
</html>
