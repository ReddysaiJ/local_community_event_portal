<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing letters</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0vh;
        }
        .bouncing{
            font-weight: bold;
            font-size: large;
            animation: bounce 4s ease-in-out infinite;
        }
        @keyframes bounce {
            0%{
                transform: translateY(0vh);
            }
            50%{
                transform: translateY(90vh);
            }
        }
    </style>
</head>
<body>
    <div class="bouncing">
        WELCOME
    </div>
</body>
</html>
